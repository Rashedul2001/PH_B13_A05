<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- main style -->
    <link rel="stylesheet" href="styles/mainStyle.css">
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <!-- I'm really getting frustrated using daisy ui. With it the design never be like figma. If I really want to make it like figma design then I have to make so many modification so what's the point of using the daisy ui!!!!! -->
    <!-- I will fix it later  -->
    <header class="px-20">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1">
                <a class="btn btn-ghost text-2xl font-semibold"><img src="/assets/github-logo.png" alt="GitHub Logo"
                        class="h-[1.5em]"> GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2 items-center ">
                <div class="relative">
                    <input type="search" name="" id="" placeholder="Search issues..."
                        class="w-80 py-3 pr-3 pl-10 border-gray-300 rounded-md">
                    <i class="fa-solid fa-magnifying-glass absolute top-[18px] left-4 text-gray-400  "></i>
                </div>
                <button class="btn btn-primary px-4 py-6 font-semibold "><i class="fa-solid fa-plus"></i>New
                    Issue</button>
            </div>
        </div>
    </header>
    <main class="mt-16 mx-60 ">
        <!-- issue buttons  -->
        <nav class="flex items-start p-6">
            <div class="grid grid-cols-3 gap-2">
                <button type="button" class="btn btn-primary py-2 px-3 text-white">All</button>
                <button type="button" class="btn py-2 px-3 text-gray-500">Open</button>
                <button type="button" class="btn py-2 px-3 text-gray-500">Closed</button>
            </div>
        </nav>

        <section class="p-6 flex items-center justify-between mt-4">
            <div class="flex items-center gap-2">
                <img src="/assets/Aperture.png" alt="Aperture">
                <div>
                    <p class="font-semibold text-xl">50 Issues</p>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-600 rounded-full"></div><span>Open</span>
                <div class="w-3 h-3 bg-purple-600 rounded-full ml-2"></div><span>Closed</span>
            </div>
        </section>
        <!-- <section id="card-container" class="p-6">


        </section> -->
    </main>




    <script src="scripts/mainScript.js"></script>
</body>

</html>
