<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- main style -->
    <link rel="stylesheet" href="../styles/mainStyle.css">
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <!-- currently I don't know how to build spinner so I have used daisy UI. I will surely learn to make beautiful loader later. -->
    <!-- there should be some module on spinner and animation  -->
    <div id="spinner" class="fixed inset-0 backdrop-blur-[1px] flex items-center justify-center z-50 hidden">
        <div class="loading loading-spinner text-secondary "></div>
    </div>
    <!-- I could use flex-wrap and left right position for another design. But don't know if it is good design or not -->
    <header class="px-5 sm:px-14 py-4 flex justify-between items-center gap-2 flex-col sm:flex-row ">
        <div class="">
            <a class="text-xl sm:text-2xl font-medium sm:font-semibold"><img src="../assets/github-logo.png"
                    alt="GitHub Logo" class="h-[1.5em] inline-block">
                GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-4 items-center  ">
            <div class="relative">
                <input id="search-box" type="search" name="search" placeholder="Search issues..."
                    class="w-44  lg:w-80 py-2 pr-3 pl-10 border-gray-300 rounded-md">
                <i class="fa-solid fa-magnifying-glass absolute top-[14px] left-4 text-gray-400  "></i>
            </div>
            <button class="btn btn-primary px-3 py-5 font-semibold "><i class="fa-solid fa-plus align-middle"></i><span
                    class="hidden md:inline-block">New
                    Issue</span></button>
        </div>
    </header>
    <main class="mt-16 container mx-auto hidden ">
        <!-- category buttons  -->
        <nav class="flex items-start p-6">
            <div class=" grid grid-cols-3 gap-2">
                <button id="btn-all" onclick='showCardList("all")' type="button"
                    class=" btn btn-primary py-2 px-3 text-white">All</button>
                <button id="btn-open" onclick='showCardList("open")' type="button"
                    class=" btn py-2 px-3 text-gray-500">Open</button>
                <button id="btn-closed" onclick='showCardList("closed")' type="button"
                    class=" btn py-2 px-3 text-gray-500">Closed</button>
            </div>
        </nav>
        <!-- info section -->
        <section class="p-6 flex items-center justify-between mt-4">
            <div class="flex items-center gap-2">
                <img src="../assets/Aperture.png" alt="Aperture">
                <div>
                    <p class="font-semibold text-xl"><span id="total-issues">0</span> Issues</p>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 bg-green-600 rounded-full"></div><span>Open</span>
                <div class="w-3 h-3 bg-purple-600 rounded-full ml-2"></div><span>Closed</span>
            </div>
        </section>
        <!-- card container -->
        <section id="card-container" class="p-6 grid grid-cols-4 gap-3">

        </section>
    </main>




    <script src="../scripts/mainScript.js"></script>
</body>

</html>
